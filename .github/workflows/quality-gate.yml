name: Pull request quality gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      base: { required: true, type: string }
      head: { required: true, type: string }

permissions:
  contents: read

jobs:
  docs-contracts:
    uses: ./.github/workflows/docs-check.yml

  backend:
    uses: ./.github/workflows/backend.yml

  frontend:
    uses: ./.github/workflows/frontend.yml

  security:
    uses: ./.github/workflows/security.yml
    secrets: inherit

  identity-access:
    uses: ./.github/workflows/identity-access.yml

  partner-onboarding:
    uses: ./.github/workflows/partner-onboarding.yml

  catalog-supply-search:
    uses: ./.github/workflows/catalog-supply-search.yml

  quotation-trade-planning:
    uses: ./.github/workflows/quotation-trade-planning.yml

  customer-quotation-acceptance:
    uses: ./.github/workflows/customer-quotation-acceptance.yml

  trade-order-conversion:
    uses: ./.github/workflows/trade-order-conversion.yml

  audit-reporting:
    uses: ./.github/workflows/audit-reporting.yml

  performance-resilience:
    uses: ./.github/workflows/performance-resilience.yml

  release-readiness:
    uses: ./.github/workflows/release-readiness.yml

  migration-history:
    uses: ./.github/workflows/migration-history.yml
    with:
      base: ${{ github.event.pull_request.base.sha || inputs.base }}
      head: ${{ github.event.pull_request.head.sha || inputs.head }}

  required:
    name: Required quality gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        docs-contracts,
        backend,
        frontend,
        security,
        identity-access,
        partner-onboarding,
        catalog-supply-search,
        quotation-trade-planning,
        customer-quotation-acceptance,
        trade-order-conversion,
        audit-reporting,
        performance-resilience,
        release-readiness,
        migration-history,
      ]
    steps:
      - name: Require every quality workflow
        env:
          DOCS_RESULT: ${{ needs['docs-contracts'].result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          IDENTITY_RESULT: ${{ needs['identity-access'].result }}
          PARTNER_RESULT: ${{ needs['partner-onboarding'].result }}
          CATALOG_RESULT: ${{ needs['catalog-supply-search'].result }}
          QUOTATION_RESULT: ${{ needs['quotation-trade-planning'].result }}
          ACCEPTANCE_RESULT: ${{ needs['customer-quotation-acceptance'].result }}
          ORDER_RESULT: ${{ needs['trade-order-conversion'].result }}
          REPORTING_RESULT: ${{ needs['audit-reporting'].result }}
          PERFORMANCE_RESULT: ${{ needs['performance-resilience'].result }}
          RELEASE_RESULT: ${{ needs['release-readiness'].result }}
          MIGRATION_RESULT: ${{ needs['migration-history'].result }}
        run: |
          test "${DOCS_RESULT}" = "success"
          test "${BACKEND_RESULT}" = "success"
          test "${FRONTEND_RESULT}" = "success"
          test "${SECURITY_RESULT}" = "success"
          test "${IDENTITY_RESULT}" = "success"
          test "${PARTNER_RESULT}" = "success"
          test "${CATALOG_RESULT}" = "success"
          test "${QUOTATION_RESULT}" = "success"
          test "${ACCEPTANCE_RESULT}" = "success"
          test "${ORDER_RESULT}" = "success"
          test "${REPORTING_RESULT}" = "success"
          test "${PERFORMANCE_RESULT}" = "success"
          test "${RELEASE_RESULT}" = "success"
          test "${MIGRATION_RESULT}" = "success"
