name: Trade order and Reservation workflow

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "contracts/**"
      - "deploy/**"
      - ".env.example"
      - "Makefile"
      - "scripts/trade_order_conversion_e2e.sh"
      - "pom.xml"
      - ".github/workflows/trade-order-conversion.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trade-order-conversion:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Verify conversion, Reservation operations, and Buyer-safe access
        run: ./scripts/trade_order_conversion_e2e.sh
