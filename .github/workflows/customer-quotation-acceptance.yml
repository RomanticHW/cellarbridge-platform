name: Customer quotation acceptance workflow

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "contracts/**"
      - "deploy/**"
      - ".env.example"
      - "scripts/customer_quotation_acceptance_e2e.sh"
      - "pom.xml"
      - ".github/workflows/customer-quotation-acceptance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  customer-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Verify idempotent customer acceptance and refresh safety
        run: ./scripts/customer_quotation_acceptance_e2e.sh
