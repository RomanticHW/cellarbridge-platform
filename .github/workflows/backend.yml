name: Backend quality

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'pom.xml'
      - '.mvn/**'
      - 'mvnw'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify backend and architecture
        run: ./mvnw --batch-mode --no-transfer-progress -pl backend -am verify
