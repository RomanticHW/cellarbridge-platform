name: Public release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out complete history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check 'PyYAML>=6,<7' 'jsonschema[format]>=4.23,<5'
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Validate repository and migration history
        run: make validate test-migration-history
      - name: Run backend and frontend verification
        run: make test
      - name: Verify release asset assembly
        run: python -m unittest -v scripts/test_prepare_release_assets.py

  runtime-evidence:
    uses: ./.github/workflows/release-readiness.yml

  security:
    uses: ./.github/workflows/security.yml

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [preflight, runtime-evidence, security]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify annotated release tag and main ancestry
        run: |
          test "$(git cat-file -t "${GITHUB_REF_NAME}")" = tag
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
          test "${GITHUB_REF_NAME}" = v1.0.0
      - name: Download machine evidence
        uses: actions/download-artifact@v6
        with:
          pattern: '*-reports'
          path: target/downloaded/security
          merge-multiple: true
      - name: Download browser evidence
        uses: actions/download-artifact@v6
        with:
          name: release-browser-evidence
          path: target/downloaded/browser
      - name: Assemble checksummed release assets
        run: >-
          python3 scripts/prepare_release_assets.py
          --security-dir target/downloaded/security
          --screenshots-dir target/downloaded/browser/screenshots
      - name: Upload assembled release evidence
        uses: actions/upload-artifact@v6
        with:
          name: cellarbridge-v1.0.0-release-assets
          path: target/release-assets/
          if-no-files-found: error
          retention-days: 90
      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            printf 'Release %s already exists; refusing to replace it.\n' "${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" target/release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title 'CellarBridge v1.0.0' \
            --notes-file docs/05-delivery/25-release-notes-v1.0.0.md \
            --verify-tag
