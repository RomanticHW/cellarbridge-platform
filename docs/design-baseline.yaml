project:
  name: CellarBridge
  chinese_name: 酒桥
  repository: cellarbridge-platform
  description: Explainable B2B wine trade orchestration from quotation to delivery
baseline:
  version: 1.0.0
  status: approved-for-implementation
  approved_on: 2026-07-13
  implementation_present: true
  current_openapi_contract: "1.13.0"
  current_asyncapi_contract: "1.5.0"
  current_database_migration: 22
  current_route_policy: ROUTE-2026-03
  route_input_summary_schema: 3
  planning_supply_decision_evidence: available
  quotation_supply_decision_freeze: available
  supply_decision_propagation: available
  inventory_unit_readiness: available
  inventory_reservation: available
  fulfillment_orchestration: available
  exception_center: available
  settlement: available
  audit_reporting: available
  observability_security: available
  performance_resilience: available
  public_release: available
  architecture_style: domain-oriented-modular-monolith
  primary_scenario: b2b-quotation-to-order-to-fulfillment
  data_policy: synthetic-only
  public_repository: true
classifications:
  - CONFIRMED
  - INFERRED
  - DEMO_ENHANCEMENT
core_modules:
  - identity-access
  - partner
  - catalog
  - inventory
  - quotation
  - trade-planning
  - trade-order
  - fulfillment
  - exception-center
  - settlement
  - audit-reporting
technology:
  current:
    java: "21 LTS"
    spring_boot: "4.1.0"
    spring_modulith: "2.1.0"
    persistence: spring-jdbc-sql-first
    postgresql: "18.4"
    keycloak: "26.7.0"
    node: "24 LTS"
    react: "19.2"
    vite: "8.1.4"
  optional:
    jpa:
      status: planned-not-installed
      decision: ADR-012
  full_profile:
    opentelemetry_collector: "0.156.0"
    prometheus: "3.12.0"
    grafana: "13.1.0"
    tempo: "2.10.5"
  not_installed:
    kafka: external-channel-not-required
    redis: correctness-path-does-not-use-cache
quality_gates:
  architecture_verification: required
  domain_unit_tests: required
  integration_tests: required
  concurrency_tests: required
  tenant_isolation_tests: required
  contract_validation: required
  e2e_demo_path: required
change_control:
  architecture_change_requires_adr: true
  contract_break_requires_version_decision: true
  migration_rewrite_after_merge: forbidden
