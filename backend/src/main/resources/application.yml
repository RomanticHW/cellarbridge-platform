spring:
  application:
    name: cellarbridge-backend
  ai:
    mcp:
      server:
        enabled: ${CELLARBRIDGE_MCP_ENABLED:false}
        name: cellarbridge-operations
        version: ${cellarbridge.build.commit}
        instructions: Authenticated read-only operations interface. Every result remains subject to CellarBridge tenant, role, ownership, and field-level authorization.
        type: SYNC
        protocol: STATELESS
        capabilities:
          completion: false
        streamable-http:
          mcp-endpoint: /mcp
          disallow-delete: true
  datasource:
    url: ${CELLARBRIDGE_DB_URL:jdbc:postgresql://localhost:5432/cellarbridge}
    username: ${CELLARBRIDGE_DB_USERNAME:cellarbridge}
    password: ${CELLARBRIDGE_DB_PASSWORD}
    hikari:
      maximum-pool-size: ${CELLARBRIDGE_DB_POOL_SIZE:10}
      connection-timeout: ${CELLARBRIDGE_DB_CONNECTION_TIMEOUT_MS:2000}
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true

server:
  port: ${CELLARBRIDGE_BACKEND_PORT:8080}
  shutdown: graceful

management:
  tracing:
    sampling:
      probability: ${CELLARBRIDGE_TRACE_SAMPLE_PROBABILITY:1.0}
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
      service.version: ${cellarbridge.build.commit}
    tracing:
      limits:
        max-attributes: 64
        max-attribute-value-length: 256
        max-links: 32
      export:
        otlp:
          endpoint: ${CELLARBRIDGE_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  prometheus:
    metrics:
      export:
        enabled: true
  otlp:
    metrics:
      export:
        enabled: false
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group.mcp.include: mcpRuntime
      status.order: DOWN,OUT_OF_SERVICE,DISABLED,MISCONFIGURED,AUTHORIZATION_SERVER_UNAVAILABLE,RATE_LIMITED,BULKHEAD_SATURATED,DOWNSTREAM_TIMEOUT,UNKNOWN,UP
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  structured:
    format:
      console: ${CELLARBRIDGE_LOG_FORMAT:ecs}
    ecs:
      service:
        name: ${spring.application.name}
        version: ${cellarbridge.build.commit}
    json:
      add:
        module: application
        errorCode: none
  level:
    root: INFO
    io.modelcontextprotocol: OFF
    org.springframework.ai.mcp.server: OFF

cellarbridge:
  build:
    commit: ${CELLARBRIDGE_COMMIT:local}
  mcp:
    security:
      resource: ${CELLARBRIDGE_MCP_RESOURCE:}
      audience: ${CELLARBRIDGE_MCP_AUDIENCE:}
      scope: ${CELLARBRIDGE_MCP_SCOPE:mcp:read}
      allowed-clients: ${CELLARBRIDGE_MCP_ALLOWED_CLIENTS:}
      allowed-origins: ${CELLARBRIDGE_MCP_ALLOWED_ORIGINS:}
      allowed-hosts: ${CELLARBRIDGE_MCP_ALLOWED_HOSTS:}
      max-request-bytes: ${CELLARBRIDGE_MCP_MAX_REQUEST_BYTES:65536}
      rate-capacity: ${CELLARBRIDGE_MCP_RATE_CAPACITY:30}
      rate-refill-per-second: ${CELLARBRIDGE_MCP_RATE_REFILL_PER_SECOND:10}
      max-concurrency: ${CELLARBRIDGE_MCP_MAX_CONCURRENCY:8}
      max-client-concurrency: ${CELLARBRIDGE_MCP_MAX_CLIENT_CONCURRENCY:4}
      rest-connection-reserve: ${CELLARBRIDGE_MCP_REST_CONNECTION_RESERVE:2}
      request-timeout: ${CELLARBRIDGE_MCP_REQUEST_TIMEOUT:PT5S}
      statement-timeout: ${CELLARBRIDGE_MCP_STATEMENT_TIMEOUT:PT3S}
    response:
      max-bytes: ${CELLARBRIDGE_MCP_MAX_RESPONSE_BYTES:262144}
      max-collection-items: ${CELLARBRIDGE_MCP_MAX_COLLECTION_ITEMS:1000}
      max-page-size: ${CELLARBRIDGE_MCP_MAX_PAGE_SIZE:100}
  security:
    issuer: ${CELLARBRIDGE_SECURITY_ISSUER:http://localhost:8081/realms/cellarbridge}
    jwk-set-uri: ${CELLARBRIDGE_SECURITY_JWK_SET_URI:http://localhost:8081/realms/cellarbridge/protocol/openid-connect/certs}
    audience: ${CELLARBRIDGE_SECURITY_AUDIENCE:cellarbridge-api}
    allowed-origins: ${CELLARBRIDGE_SECURITY_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  partner:
    cursor-secret: ${CELLARBRIDGE_PARTNER_CURSOR_SECRET}
  catalog:
    cursor-secret: ${CELLARBRIDGE_CATALOG_CURSOR_SECRET}
    cursor-ttl: ${CELLARBRIDGE_CATALOG_CURSOR_TTL:PT15M}
  order:
    cursor-secret: ${CELLARBRIDGE_ORDER_CURSOR_SECRET}
  settlement:
    cursor-secret: ${CELLARBRIDGE_SETTLEMENT_CURSOR_SECRET}
  audit-reporting:
    cursor-secret: ${CELLARBRIDGE_AUDIT_CURSOR_SECRET}
    cursor-ttl: ${CELLARBRIDGE_AUDIT_CURSOR_TTL:PT15M}
  platform:
    local-events:
      enabled: ${CELLARBRIDGE_LOCAL_EVENTS_ENABLED:false}
      batch-size: ${CELLARBRIDGE_LOCAL_EVENTS_BATCH_SIZE:50}
      max-attempts: ${CELLARBRIDGE_LOCAL_EVENTS_MAX_ATTEMPTS:5}
      base-delay-seconds: ${CELLARBRIDGE_LOCAL_EVENTS_BASE_DELAY_SECONDS:5}
      max-delay-seconds: ${CELLARBRIDGE_LOCAL_EVENTS_MAX_DELAY_SECONDS:300}
