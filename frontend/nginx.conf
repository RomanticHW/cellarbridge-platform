limit_req_zone $binary_remote_addr zone=portal_client:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    location /actuator/ {
        proxy_pass http://backend:8080/actuator/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Portal capability tokens are part of the URL by contract. Do not write token-bearing requests to logs.
    location ^~ /api/v1/portal/quotations/ {
        access_log off;
        error_log /dev/null emerg;
        log_not_found off;
        limit_req zone=portal_client burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /portal/quotations/ {
        access_log off;
        error_log /dev/null emerg;
        log_not_found off;
        limit_req zone=portal_client burst=20 nodelay;
        limit_req_status 429;
        root /usr/share/nginx/html;
        try_files $uri $uri/ @portal_spa;
        add_header Cache-Control "no-store" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    location ^~ /portal/quotes/ {
        access_log off;
        error_log /dev/null emerg;
        log_not_found off;
        limit_req zone=portal_client burst=20 nodelay;
        limit_req_status 429;
        root /usr/share/nginx/html;
        try_files $uri $uri/ @portal_spa;
        add_header Cache-Control "no-store" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # Keep token-bearing SPA fallbacks inside a non-logging location. `break` avoids
    # a second location lookup that would otherwise move the request to `location /`.
    location @portal_spa {
        internal;
        access_log off;
        error_log /dev/null emerg;
        log_not_found off;
        root /usr/share/nginx/html;
        rewrite ^ /index.html break;
        add_header Cache-Control "no-store" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    error_page 429 = @portal_rate_limited;

    location @portal_rate_limited {
        access_log off;
        error_log /dev/null emerg;
        default_type application/problem+json;
        add_header Cache-Control "no-store" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Retry-After "1" always;
        add_header X-Content-Type-Options "nosniff" always;
        return 429 '{"type":"about:blank","title":"Too many requests","status":429,"detail":"The secure portal request limit was exceeded. Retry later.","code":"RATE_LIMITED","traceId":"edge","retryable":true}';
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
