    messages:
      - $ref: '#/channels/exceptionClosed/messages/exceptionClosed'
  sendQuotationAccepted:
    action: send
    channel:
      $ref: '#/channels/quotationAccepted'
    summary: Quotation publishes an accepted commercial snapshot.
    messages:
      - $ref: '#/channels/quotationAccepted/messages/quotationAccepted'
  receiveQuotationAccepted:
    action: receive
    channel:
      $ref: '#/channels/quotationAccepted'
    summary: Trade Order consumes the event idempotently.
    messages:
      - $ref: '#/channels/quotationAccepted/messages/quotationAccepted'
  sendTradeOrderCreated:
    action: send
    channel:
      $ref: '#/channels/tradeOrderCreated'
    messages:
      - $ref: '#/channels/tradeOrderCreated/messages/tradeOrderCreated'
  receiveTradeOrderCreated:
    action: receive
    channel:
      $ref: '#/channels/tradeOrderCreated'
    summary: Quotation conversion tracking, inventory and reporting consume the event independently.
    messages:
      - $ref: '#/channels/tradeOrderCreated/messages/tradeOrderCreated'
  sendReservationConfirmed:
    action: send
    channel:
      $ref: '#/channels/inventoryReservationConfirmed'
    messages:
      - $ref: '#/channels/inventoryReservationConfirmed/messages/inventoryReservationConfirmed'
  receiveReservationConfirmed:
    action: receive
    channel:
      $ref: '#/channels/inventoryReservationConfirmed'
    summary: Order, fulfillment and reporting consume the event.
    messages:
      - $ref: '#/channels/inventoryReservationConfirmed/messages/inventoryReservationConfirmed'
  sendReservationFailed:
    action: send
    channel:
      $ref: '#/channels/inventoryReservationFailed'
    messages:
      - $ref: '#/channels/inventoryReservationFailed/messages/inventoryReservationFailed'
  receiveReservationFailed:
    action: receive
    channel:
      $ref: '#/channels/inventoryReservationFailed'
    summary: Order, exception and reporting consume the event.
    messages:
      - $ref: '#/channels/inventoryReservationFailed/messages/inventoryReservationFailed'
  sendFulfillmentPlanCreated:
    action: send
    channel:
      $ref: '#/channels/fulfillmentPlanCreated'
    messages:
      - $ref: '#/channels/fulfillmentPlanCreated/messages/fulfillmentPlanCreated'
  receiveFulfillmentPlanCreated:
    action: receive
    channel:
      $ref: '#/channels/fulfillmentPlanCreated'
    summary: Trade Order consumes the plan-created fact idempotently.
    messages:
      - $ref: '#/channels/fulfillmentPlanCreated/messages/fulfillmentPlanCreated'
  sendFulfillmentStepStarted:
    action: send
    channel:
      $ref: '#/channels/fulfillmentStepStarted'
    messages:
      - $ref: '#/channels/fulfillmentStepStarted/messages/fulfillmentStepStarted'
  receiveFulfillmentStepStarted:
    action: receive
    channel:
      $ref: '#/channels/fulfillmentStepStarted'
    summary: Trade Order consumes step starts to expose in-progress state.
    messages:
      - $ref: '#/channels/fulfillmentStepStarted/messages/fulfillmentStepStarted'
  sendFulfillmentStepOverdue:
    action: send
    channel:
      $ref: '#/channels/fulfillmentStepOverdue'
    messages:
      - $ref: '#/channels/fulfillmentStepOverdue/messages/fulfillmentStepOverdue'
  sendPublicMilestoneReached:
