    InventoryReservationConfirmedV1:
      name: InventoryReservationConfirmedV1
      title: Inventory reservation confirmed
      correlationId:
        location: $message.payload#/correlationId
      headers:
        $ref: '#/components/schemas/EventHeaders'
      payload:
        $ref: '../schemas/events/inventory-reservation-confirmed-v1.schema.json'
    InventoryReservationFailedV1:
      name: InventoryReservationFailedV1
      title: Inventory reservation failed
      correlationId:
        location: $message.payload#/correlationId
      headers:
        $ref: '#/components/schemas/EventHeaders'
      payload:
        $ref: '../schemas/events/inventory-reservation-failed-v1.schema.json'
    FulfillmentStepFailedV1:
      name: FulfillmentStepFailedV1
      title: Fulfillment step failed
      correlationId:
        location: $message.payload#/correlationId
      headers:
        $ref: '#/components/schemas/EventHeaders'
      payload:
        $ref: '../schemas/events/fulfillment-step-failed-v1.schema.json'
    FulfillmentCompletedV1:
      name: FulfillmentCompletedV1
      title: Fulfillment completed
      correlationId:
        location: $message.payload#/correlationId
      headers:
        $ref: '#/components/schemas/EventHeaders'
      payload:
        $ref: '../schemas/events/fulfillment-completed-v1.schema.json'
    ExceptionOpenedV1:
      name: ExceptionOpenedV1
      title: Exception opened
      correlationId:
        location: $message.payload#/correlationId
      headers:
        $ref: '#/components/schemas/EventHeaders'
      payload:
        $ref: '../schemas/events/exception-opened-v1.schema.json'
    ReceivableCreatedV1:
      name: ReceivableCreatedV1
      title: Receivable created
      correlationId:
        location: $message.payload#/correlationId
      headers:
        $ref: '#/components/schemas/EventHeaders'
      payload:
        $ref: '../schemas/events/receivable-created-v1.schema.json'
  schemas:
    EventHeaders:
      type: object
      additionalProperties: false
      properties:
        eventId: { type: string, format: uuid }
        eventType: { type: string }
        schemaRef: { type: string }
        traceparent: { type: string }
      required: [eventId, eventType, schemaRef]
