      - $ref: '#/channels/exceptionOpened/messages/exceptionOpened'
  receiveExceptionOpened:
    action: receive
    channel:
      $ref: '#/channels/exceptionOpened'
    summary: Notification and reporting consume the event.
    messages:
      - $ref: '#/channels/exceptionOpened/messages/exceptionOpened'
  sendReceivableCreated:
    action: send
    channel:
      $ref: '#/channels/receivableCreated'
    messages:
      - $ref: '#/channels/receivableCreated/messages/receivableCreated'
  receiveReceivableCreated:
    action: receive
    channel:
      $ref: '#/channels/receivableCreated'
