    TradeOrderCreatedV1:
      name: TradeOrderCreatedV1
      title: Trade order created
      summary: Self-contained commercial and Supply Decision evidence for FROZEN orders; Legacy V1 omits decision fields.
      correlationId:
        location: $message.payload#/correlationId
      headers:
        $ref: '#/components/schemas/EventHeaders'
      payload:
        $ref: '../schemas/events/trade-order-created-v1.schema.json'
      examples:
        - name: frozenTradeOrder
          payload:
            id: 11000000-0000-4000-8000-000000000002
            type: cellarbridge.order.created.v1
            specVersion: "1.0"
            occurredAt: "2026-07-20T10:16:00Z"
