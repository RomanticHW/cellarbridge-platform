                city: Shanghai
                district: Pudong
                line1: 88 Harbor Avenue
                postalCode: "200120"
              snapshotHash: c2d9de573e494036e90e77b836956600a9054e0f890c602572fd1e278a1badde
              supplyDecision:
                schemaVersion: 1
                policyVersion: SUPPLY-DECISION-2026-01
                decidedAt: "2026-07-20T10:14:00Z"
                sourceRouteEvaluationId: 28000000-0000-4000-8000-000000000001
                sourceRouteInputHash: cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
                selectedRouteCode: NB_BONDED_B2B
                inventoryDataAsOf: "2026-07-20T10:13:00Z"
