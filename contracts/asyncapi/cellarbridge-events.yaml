    channel:
      $ref: '#/channels/receivableOverdue'
    summary: Notification and reporting consume the event.
    messages:
      - $ref: '#/channels/receivableOverdue/messages/receivableOverdue'
  sendReceivablePaid:
    action: send
    channel:
      $ref: '#/channels/receivablePaid'
    messages:
      - $ref: '#/channels/receivablePaid/messages/receivablePaid'
  receiveReceivablePaid:
    action: receive
    channel:
      $ref: '#/channels/receivablePaid'
    summary: Order and reporting consume the event.
    messages:
      - $ref: '#/channels/receivablePaid/messages/receivablePaid'
