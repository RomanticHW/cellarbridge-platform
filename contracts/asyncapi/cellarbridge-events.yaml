      name: PartnerLifecycleV1
      title: Partner lifecycle transition
      correlationId:
        location: $message.payload#/correlationId
      headers:
        $ref: '#/components/schemas/EventHeaders'
      payload:
        $ref: '../schemas/events/partner-lifecycle-v1.schema.json'
    QuotationLifecycleV1:
