asyncapi: 3.0.0
info:
  title: CellarBridge Integration Events
  version: 1.5.0
  description: |
    Versioned integration-event contract for the CellarBridge full profile.
    Delivery semantics are at-least-once; every consumer must deduplicate by event id.
    All data and examples are synthetic.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  tags:
    - name: partner
    - name: quotation
    - name: order
    - name: inventory
    - name: fulfillment
    - name: exception
    - name: settlement
defaultContentType: application/json
servers:
  localKafka:
    host: localhost:9092
    protocol: kafka
    description: Local full-profile Kafka broker
channels:
  partnerLifecycle:
    address: cellarbridge.partner.{transition}.v1
    description: Partner review and eligibility state transitions consumed by audit, work-queue and reporting projectors.
    parameters:
      transition:
        enum: [submitted-for-review, activated, changes-requested, rejected, suspended]
    messages:
      partnerLifecycle:
        $ref: '#/components/messages/PartnerLifecycleV1'
  quotationLifecycle:
    address: cellarbridge.quotation.{transition}.v1
    description: Quotation authoring, approval and issue transitions consumed by audit, work-queue and reporting projectors.
    parameters:
      transition:
        enum: [draft-created, approval-requested, approved, changes-requested, rejected, issued]
    messages:
      quotationLifecycle:
        $ref: '#/components/messages/QuotationLifecycleV1'
  tradePlanningRouteEvaluated:
    address: cellarbridge.trade-planning.route-evaluated.v1
    description: A route evaluation or override was persisted with the quotation revision.
    messages:
      tradePlanningRouteEvaluated:
        $ref: '#/components/messages/QuotationLifecycleV1'
  exceptionClosed:
    address: cellarbridge.exception.closed.v1
    description: An authorized user closed an exception after recording a safe resolution reason.
    messages:
      exceptionClosed:
        $ref: '#/components/messages/ExceptionClosedV1'
  quotationAccepted:
    address: cellarbridge.quotation.accepted.v1
    description: A customer has accepted a quotation revision. Current events carry complete frozen Supply Decision evidence; pre-1.0 Legacy events omit the root and every line allocationMode.
    messages:
      quotationAccepted:
        $ref: '#/components/messages/QuotationAcceptedV1'
  tradeOrderCreated:
    address: cellarbridge.order.created.v1
    description: A unique trade order has been created from an accepted quotation. FROZEN orders carry complete Supply Decision evidence; LEGACY_UNVERIFIED orders omit the root and every line allocationMode.
    messages:
      tradeOrderCreated:
        $ref: '#/components/messages/TradeOrderCreatedV1'
  inventoryReservationConfirmed:
    address: cellarbridge.inventory.reservation-confirmed.v1
    description: All order lines were reserved atomically.
    messages:
      inventoryReservationConfirmed:
        $ref: '#/components/messages/InventoryReservationConfirmedV1'
  inventoryReservationFailed:
    address: cellarbridge.inventory.reservation-failed.v1
    description: The all-or-nothing reservation failed without retaining new allocations.
    messages:
      inventoryReservationFailed:
        $ref: '#/components/messages/InventoryReservationFailedV1'
  fulfillmentPlanCreated:
    address: cellarbridge.fulfillment.plan-created.v1
    description: A route-bound, versioned fulfillment plan snapshot was created.
    messages:
      fulfillmentPlanCreated:
        $ref: '#/components/messages/FulfillmentPlanCreatedV1'
  fulfillmentStepStarted:
    address: cellarbridge.fulfillment.step-started.v1
    description: A fulfillment step started after all required dependencies completed.
    messages:
      fulfillmentStepStarted:
        $ref: '#/components/messages/FulfillmentStepStartedV1'
  fulfillmentStepOverdue:
    address: cellarbridge.fulfillment.step-overdue.v1
    description: SLA evaluation marked an active fulfillment step overdue.
    messages:
      fulfillmentStepOverdue:
        $ref: '#/components/messages/FulfillmentStepOverdueV1'
  publicMilestoneReached:
    address: cellarbridge.fulfillment.public-milestone-reached.v1
    description: A customer-safe fulfillment milestone was reached.
    messages:
      publicMilestoneReached:
        $ref: '#/components/messages/PublicMilestoneReachedV1'
  fulfillmentStepFailed:
    address: cellarbridge.fulfillment.step-failed.v1
    description: A fulfillment step failed and may require an exception case.
    messages:
      fulfillmentStepFailed:
        $ref: '#/components/messages/FulfillmentStepFailedV1'
  fulfillmentCompleted:
    address: cellarbridge.fulfillment.completed.v1
    description: All required fulfillment steps completed.
    messages:
      fulfillmentCompleted:
        $ref: '#/components/messages/FulfillmentCompletedV1'
  exceptionOpened:
    address: cellarbridge.exception.opened.v1
    description: A deduplicated exception case was opened.
    messages:
      exceptionOpened:
        $ref: '#/components/messages/ExceptionOpenedV1'
  receivableCreated:
    address: cellarbridge.settlement.receivable-created.v1
    description: A unique receivable was created for a configured business trigger.
    messages:
      receivableCreated:
        $ref: '#/components/messages/ReceivableCreatedV1'
  paymentRecorded:
    address: cellarbridge.settlement.payment-recorded.v1
    description: An immutable external payment fact was recorded idempotently.
    messages:
      paymentRecorded:
        $ref: '#/components/messages/PaymentRecordedV1'
  paymentReversed:
    address: cellarbridge.settlement.payment-reversed.v1
    description: An immutable reversal corrected part or all of a payment without deleting history.
    messages:
      paymentReversed:
        $ref: '#/components/messages/PaymentReversedV1'
  receivableOverdue:
    address: cellarbridge.settlement.receivable-overdue.v1
    description: A due receivable with a remaining balance was marked overdue.
    messages:
      receivableOverdue:
        $ref: '#/components/messages/ReceivableOverdueV1'
  receivablePaid:
    address: cellarbridge.settlement.receivable-paid.v1
    description: Effective payments reduced the receivable balance to zero.
    messages:
      receivablePaid:
        $ref: '#/components/messages/ReceivablePaidV1'
operations:
  sendPartnerLifecycle:
    action: send
    channel:
      $ref: '#/channels/partnerLifecycle'
    messages:
      - $ref: '#/channels/partnerLifecycle/messages/partnerLifecycle'
  receivePartnerLifecycle:
    action: receive
    channel:
      $ref: '#/channels/partnerLifecycle'
    summary: Audit and reporting consume partner transitions idempotently.
    messages:
      - $ref: '#/channels/partnerLifecycle/messages/partnerLifecycle'
  sendQuotationLifecycle:
    action: send
    channel:
      $ref: '#/channels/quotationLifecycle'
    messages:
      - $ref: '#/channels/quotationLifecycle/messages/quotationLifecycle'
  receiveQuotationLifecycle:
    action: receive
    channel:
      $ref: '#/channels/quotationLifecycle'
    summary: Audit and reporting consume quotation transitions idempotently.
    messages:
      - $ref: '#/channels/quotationLifecycle/messages/quotationLifecycle'
  sendTradePlanningRouteEvaluated:
    action: send
    channel:
      $ref: '#/channels/tradePlanningRouteEvaluated'
    messages:
      - $ref: '#/channels/tradePlanningRouteEvaluated/messages/tradePlanningRouteEvaluated'
  receiveTradePlanningRouteEvaluated:
    action: receive
    channel:
      $ref: '#/channels/tradePlanningRouteEvaluated'
    summary: Reporting consumes route distribution facts idempotently.
