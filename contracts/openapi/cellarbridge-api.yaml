          schema: { type: string, format: date }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Dashboard projection
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Dashboard' }
  /audit/entries:
    get:
      tags: [Audit]
      operationId: listAuditEntries
      summary: Search the authorized audit timeline
      x-requirements: [FR-AUD-001, FR-AUD-002]
      x-permissions: [audit:read]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: subjectType
          in: query
          schema: { type: string, maxLength: 50 }
        - name: subjectId
          in: query
          schema: { type: string, format: uuid }
        - name: correlationId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Audit page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditPage' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  headers:
    ETag:
      description: Quoted optimistic version value
      schema: { type: string, example: '"7"' }
    IdempotencyReplayed:
      description: True when an earlier completed result is returned
      schema: { type: boolean }
  parameters:
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string, maxLength: 1000 }
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema: { type: string, pattern: '^"[0-9]+"$' }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 20
        maxLength: 200
        pattern: '^[A-Za-z0-9._~-]+$'
    IdempotencyKeyOptional:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, minLength: 20, maxLength: 200 }
    PartnerId:
      name: partnerId
      in: path
      required: true
      schema: { type: string, format: uuid }
    QuotationId:
      name: quotationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrderId:
      name: orderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PlanId:
      name: planId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ExceptionId:
      name: exceptionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReceivableId:
      name: receivableId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PublicToken:
      name: publicToken
      in: path
      required: true
      schema:
        type: string
        minLength: 43
        maxLength: 43
        pattern: '^[A-Za-z0-9_-]{43}$'
  responses:
    AuthenticationRequired:
      description: Authentication required or token invalid
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    AccessDenied:
      description: Authenticated actor is not allowed to perform the action
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Resource is not visible in the current tenant and permission scope
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    ValidationFailed:
      description: Request validation failed
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    Conflict:
      description: Business state, uniqueness or idempotency conflict
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    VersionConflict:
      description: Expected version does not match the current resource version
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    PreconditionRequired:
      description: If-Match is required
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    BusinessUnprocessable:
      description: Syntactically valid request cannot satisfy the business preconditions
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    RateLimited:
      description: The public portal request rate has been exceeded
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    DependencyUnavailable:
      description: A required dependency is temporarily unavailable
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
  schemas:
    CurrentUser:
      type: object
      required: [userId, displayName, tenant, partnerId, permissions, roles]
      properties:
        userId: { type: string, format: uuid }
        displayName: { type: string }
        partnerId:
          type: [string, 'null']
          format: uuid
          description: Identity-mapped buyer organization; null for non-partner-scoped internal actors.
        tenant:
          type: object
          required: [id, name, status]
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            status: { type: string, enum: [ACTIVE, SUSPENDED] }
        roles:
          type: array
          items: { type: string }
          uniqueItems: true
        permissions:
          type: array
          items: { type: string }
          uniqueItems: true
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount: { type: string, pattern: '^-?[0-9]+(\.[0-9]{1,4})?$' }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
    Quantity:
      type: object
      required: [value, unit]
      properties:
        value: { type: string, pattern: '^[0-9]+(\.[0-9]{1,6})?$' }
        unit: { type: string, enum: [CASE, BOTTLE] }
    Address:
      type: object
      required: [countryCode, province, city, line1]
      properties:
        countryCode: { type: string, pattern: '^[A-Z]{2}$' }
        province: { type: string, maxLength: 100 }
        city: { type: string, maxLength: 100 }
        district: { type: string, maxLength: 100 }
        line1: { type: string, maxLength: 200 }
        postalCode: { type: string, maxLength: 20 }
    PageInfo:
      type: object
      required: [hasNext, pageSize]
      properties:
        nextCursor: { type: [string, 'null'] }
        hasNext: { type: boolean }
        pageSize: { type: integer }
    Problem:
      type: object
      required: [type, title, status, code, traceId, retryable]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: string }
        instance: { type: string, format: uri-reference }
        code: { type: string, pattern: '^[A-Z][A-Z0-9_]+$' }
        traceId: { type: string }
        retryable: { type: boolean }
        currentVersion: { type: integer, format: int64 }
        currentState: { type: string }
        errors:
          type: array
          items:
            type: object
            required: [field, code, message]
            properties:
              field: { type: string }
              code: { type: string }
              message: { type: string }
    PartnerStatus:
      type: string
      enum: [DRAFT, PENDING_REVIEW, CHANGES_REQUESTED, ACTIVE, SUSPENDED, REJECTED]
    TradeRouteCode:
      type: string
      enum: [SH_GENERAL_TRADE, NB_BONDED_B2B, HK_FREE_TRADE]
    SupplyType:
      type: string
      enum: [DOMESTIC_ON_HAND, BONDED_ON_HAND, HONG_KONG_ON_HAND, IN_TRANSIT_PRESALE, OVERSEAS_SOURCING]
    AvailabilityClass:
      type: string
      enum: [AVAILABLE, LIMITED, UNAVAILABLE, REQUIRES_CONFIRMATION]
    PartnerSummary:
      type: object
      required: [id, number, legalName, displayName, status, defaultCurrency, routeEligibility, version, updatedAt]
      properties:
        id: { type: string, format: uuid }
        number: { type: string }
        legalName: { type: [string, 'null'] }
        displayName: { type: [string, 'null'] }
        status: { $ref: '#/components/schemas/PartnerStatus' }
        defaultCurrency: { type: [string, 'null'] }
        routeEligibility:
          type: array
          items: { $ref: '#/components/schemas/TradeRouteCode' }
        salesOwnerId: { type: string, format: uuid }
        version: { type: integer, format: int64 }
        updatedAt: { type: string, format: date-time }
    PartnerPage:
      type: object
      required: [items, pageInfo]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PartnerSummary' }
        pageInfo: { $ref: '#/components/schemas/PageInfo' }
    ContactInput:
      type: object
      required: [name, email]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        email: { type: string, format: email, maxLength: 254 }
        phone: { type: string, maxLength: 40 }
        primary: { type: boolean, default: false }
    PartnerDraftContact:
      type: object
      properties:
        name: { type: [string, 'null'], maxLength: 100 }
        email:
          anyOf:
            - { type: string, pattern: '^$' }
            - { type: string, format: email, maxLength: 254 }
            - { type: 'null' }
        phone: { type: [string, 'null'], maxLength: 40 }
        primary: { type: boolean, default: false }
    PartnerDraftAddress:
      type: object
      properties:
        countryCode:
          anyOf:
            - { type: string, pattern: '^$|^[A-Z]{2}$' }
            - { type: 'null' }
        province: { type: [string, 'null'], maxLength: 100 }
        city: { type: [string, 'null'], maxLength: 100 }
        district: { type: [string, 'null'], maxLength: 100 }
        line1: { type: [string, 'null'], maxLength: 200 }
        postalCode: { type: [string, 'null'], maxLength: 20 }
    CreatePartnerRequest:
      type: object
      properties:
        legalName: { type: string, maxLength: 200 }
        displayName: { type: string, maxLength: 100 }
        registrationIdentifier: { type: string, maxLength: 100 }
        type: { type: string, enum: [RESTAURANT_GROUP, DISTRIBUTOR, RETAILER, CORPORATE_BUYER, OTHER] }
        defaultCurrency: { type: string, pattern: '^$|^[A-Z]{3}$' }
        requestedPaymentTermDays: { type: integer, minimum: 0, maximum: 180 }
        requestedRouteCodes:
          type: array
          items: { $ref: '#/components/schemas/TradeRouteCode' }
          uniqueItems: true
        requestedServiceRegions:
          type: array
          items: { type: string, minLength: 1, maxLength: 80 }
          uniqueItems: true
        requestedCurrencies:
          type: array
          items: { type: string, pattern: '^[A-Z]{3}$' }
          uniqueItems: true
        contact: { $ref: '#/components/schemas/PartnerDraftContact' }
        billingAddress: { $ref: '#/components/schemas/PartnerDraftAddress' }
        duplicateResolutionNote: { type: string, maxLength: 500 }
    UpdatePartnerRequest:
      type: object
      properties:
        legalName: { type: string, maxLength: 200 }
        displayName: { type: string, maxLength: 100 }
        registrationIdentifier: { type: string, maxLength: 100 }
        type: { type: string, enum: [RESTAURANT_GROUP, DISTRIBUTOR, RETAILER, CORPORATE_BUYER, OTHER] }
        defaultCurrency: { type: string, pattern: '^$|^[A-Z]{3}$' }
        requestedPaymentTermDays: { type: integer, minimum: 0, maximum: 180 }
        requestedRouteCodes:
          type: array
          items: { $ref: '#/components/schemas/TradeRouteCode' }
        requestedServiceRegions:
          type: array
          items: { type: string, minLength: 1, maxLength: 80 }
        requestedCurrencies:
          type: array
          items: { type: string, pattern: '^[A-Z]{3}$' }
        contact: { $ref: '#/components/schemas/PartnerDraftContact' }
        billingAddress: { $ref: '#/components/schemas/PartnerDraftAddress' }
        duplicateResolutionNote: { type: string, maxLength: 500 }
    PartnerDetail:
      allOf:
        - $ref: '#/components/schemas/PartnerSummary'
        - type: object
          required: [type, contacts, billingAddress, allowedActions, requestedServiceRegions, requestedCurrencies, duplicateWarnings, timeline]
          properties:
            type:
              type: [string, 'null']
              enum: [RESTAURANT_GROUP, DISTRIBUTOR, RETAILER, CORPORATE_BUYER, OTHER, null]
            registrationIdentifierMasked: { type: [string, 'null'] }
            contacts:
              type: array
              items: { $ref: '#/components/schemas/PartnerDraftContact' }
            billingAddress:
              oneOf:
                - { $ref: '#/components/schemas/PartnerDraftAddress' }
                - { type: 'null' }
            paymentTermDays: { type: [integer, 'null'] }
            creditLimit:
              oneOf: [{ $ref: '#/components/schemas/Money' }, { type: 'null' }]
            eligibility:
              oneOf: [{ $ref: '#/components/schemas/PartnerEligibility' }, { type: 'null' }]
            requestedServiceRegions:
              type: array
              items: { type: string }
            requestedCurrencies:
              type: array
              items: { type: string, pattern: '^[A-Z]{3}$' }
            allowedActions:
              type: array
              items: { type: string }
            duplicateWarnings:
              type: array
              items: { type: string }
            timeline:
              type: array
              items: { $ref: '#/components/schemas/PartnerTimelineEntry' }
    PartnerEligibility:
      type: object
      required: [version, routeCodes, serviceRegions, currencies, paymentTermDays, effectiveFrom]
