      type: object
      additionalProperties: false
      properties:
        reasonCategory: { $ref: '#/components/schemas/QuotationRejectionReason' }
    QuotationRejectionResult:
      type: object
      additionalProperties: false
      required: [rejectionId, quotationNumber, status, rejectedAt, replayed]
      properties:
        rejectionId: { type: string, format: uuid }
        quotationNumber: { type: string }
        status: { const: REJECTED_BY_CUSTOMER }
        rejectedAt: { type: string, format: date-time }
        reasonCategory:
          oneOf:
