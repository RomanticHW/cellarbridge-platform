openapi: 3.1.0
info:
  title: CellarBridge API
  version: 1.4.0
  summary: Contract baseline for B2B wine quotation, order, inventory and fulfillment
  description: |
    This contract remains the design-first integration baseline for CellarBridge. All examples are synthetic.
    The authenticated `/me`, partner-onboarding, catalog supply-search, quotation and trade-order
    endpoints are delivered as vertical slices; remaining business endpoints retain their approved contracts.
    Internal commercial fields and customer-portal fields intentionally use separate schemas.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Identity
  - name: Partners
  - name: Catalog
  - name: Quotations
  - name: Customer Portal
  - name: Orders
  - name: Inventory
  - name: Fulfillment
  - name: Exceptions
  - name: Settlement
  - name: Reporting
  - name: Audit
paths:
  /me:
    get:
      tags: [Identity]
      operationId: getCurrentUser
      summary: Get the authenticated user, tenant and permission context
      x-requirements: [FR-IAM-001, FR-IAM-002, FR-IAM-003]
      responses:
        '200':
          description: Current access context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/AccessDenied'
  /partners:
    get:
      tags: [Partners]
      operationId: listPartners
      summary: List partners visible to the current actor
      x-permissions: [partner:read]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: keyword
          in: query
          schema: { type: string, minLength: 1, maxLength: 100 }
        - name: status
          in: query
          schema:
            type: array
            items: { $ref: '#/components/schemas/PartnerStatus' }
          explode: false
        - name: routeCode
          in: query
          schema: { $ref: '#/components/schemas/TradeRouteCode' }
        - name: ownerId
          in: query
          schema: { type: string, format: uuid }
        - name: updatedFrom
          in: query
          schema: { type: string, format: date-time }
        - name: updatedTo
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Partner page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerPage'
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
    post:
      tags: [Partners]
      operationId: createPartnerDraft
      summary: Create a partner draft
      x-requirements: [FR-PAR-001]
      x-permissions: [partner:create]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePartnerRequest' }
      responses:
        '201':
          description: Partner draft created
          headers:
            Location:
              schema: { type: string, format: uri-reference }
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PartnerDetail' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '409': { $ref: '#/components/responses/Conflict' }
  /partners/{partnerId}:
    parameters:
      - $ref: '#/components/parameters/PartnerId'
    get:
      tags: [Partners]
      operationId: getPartner
      summary: Get partner detail
      x-permissions: [partner:read]
      responses:
        '200':
          description: Partner detail
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PartnerDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '403': { $ref: '#/components/responses/AccessDenied' }
    patch:
      tags: [Partners]
      operationId: updatePartnerDraft
      summary: Update an editable partner draft
      x-permissions: [partner:create]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/UpdatePartnerRequest' }
      responses:
        '200':
          description: Updated partner
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PartnerDetail' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/VersionConflict' }
        '428': { $ref: '#/components/responses/PreconditionRequired' }
  /partners/{partnerId}/submission:
    post:
      tags: [Partners]
      operationId: submitPartnerForReview
      summary: Submit a partner draft for review
      x-requirements: [FR-PAR-001, FR-PAR-002]
      x-permissions: [partner:submit]
      parameters:
        - $ref: '#/components/parameters/PartnerId'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Partner submitted
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PartnerCommandResult' }
        '409': { $ref: '#/components/responses/Conflict' }
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '412': { $ref: '#/components/responses/VersionConflict' }
        '422': { $ref: '#/components/responses/BusinessUnprocessable' }
        '428': { $ref: '#/components/responses/PreconditionRequired' }
  /partners/{partnerId}/review:
    post:
      tags: [Partners]
      operationId: reviewPartner
      summary: Approve, request changes or reject a partner application
      x-requirements: [FR-PAR-003, FR-PAR-004]
      x-permissions: [partner:review]
      parameters:
        - $ref: '#/components/parameters/PartnerId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PartnerReviewRequest' }
      responses:
        '200':
          description: Review recorded
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PartnerCommandResult' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/VersionConflict' }
        '428': { $ref: '#/components/responses/PreconditionRequired' }
  /partners/{partnerId}/suspension:
    post:
      tags: [Partners]
      operationId: suspendPartner
      summary: Suspend an active partner while retaining eligibility history
      x-requirements: [FR-PAR-005]
      x-permissions: [partner:review]
      parameters:
        - $ref: '#/components/parameters/PartnerId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PartnerReasonRequest' }
      responses:
        '200':
          description: Partner suspended
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PartnerCommandResult' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/VersionConflict' }
        '428': { $ref: '#/components/responses/PreconditionRequired' }
  /partners/{partnerId}/reactivation:
    post:
      tags: [Partners]
      operationId: requestPartnerReactivation
      summary: Submit a suspended partner for independent reactivation review
      x-requirements: [FR-PAR-005]
      x-permissions: [partner:submit]
      parameters:
        - $ref: '#/components/parameters/PartnerId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PartnerReasonRequest' }
      responses:
        '200':
          description: Reactivation review requested
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PartnerCommandResult' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/VersionConflict' }
        '428': { $ref: '#/components/responses/PreconditionRequired' }
  /catalog/skus:
    get:
      tags: [Catalog]
      operationId: searchSkus
      summary: Search SKU and supply summaries
      x-requirements: [FR-CAT-001, FR-CAT-002, FR-INV-002, FR-INV-003]
      x-permissions: [catalog:read, inventory:read]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: keyword
          in: query
          schema: { type: string, minLength: 1, maxLength: 100 }
        - name: producer
          in: query
          schema: { type: string, minLength: 1, maxLength: 160 }
        - name: region
          in: query
          schema: { type: string, minLength: 1, maxLength: 160 }
        - name: countryCode
          in: query
          schema: { type: string, pattern: '^[A-Z]{2}$' }
        - name: category
          in: query
          schema:
            type: string
            enum: [RED, WHITE, ROSE, SPARKLING, FORTIFIED, DESSERT, OTHER]
        - name: vintage
          in: query
          schema: { type: string, pattern: '^(NV|19[0-9]{2}|20[0-9]{2})$' }
        - name: volumeMl
          in: query
          schema: { type: integer, minimum: 1 }
        - name: supplyType
          in: query
          schema:
            type: array
            items: { $ref: '#/components/schemas/SupplyType' }
          explode: false
        - name: availabilityClass
          in: query
          schema:
            type: array
            items: { $ref: '#/components/schemas/AvailabilityClass' }
          explode: false
        - name: automaticallyReservable
          in: query
          schema: { type: boolean }
        - name: availableFrom
          in: query
          schema: { type: string, format: date-time }
        - name: availableTo
          in: query
          schema: { type: string, format: date-time }
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, name, -updatedAt, vintage]
            default: relevance
      responses:
        '200':
          description: SKU search results
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkuSearchPage' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '403': { $ref: '#/components/responses/AccessDenied' }
  /catalog/skus/{skuId}:
    get:
      tags: [Catalog]
      operationId: getSku
      summary: Get a current or inactive SKU and its visible supply summaries
      x-requirements: [FR-CAT-001, FR-CAT-003, FR-INV-002, FR-INV-003]
      x-permissions: [catalog:read, inventory:read]
      parameters:
        - name: skuId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: SKU detail
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkuSearchItem' }
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '404': { $ref: '#/components/responses/NotFound' }
  /quotations:
    get:
      tags: [Quotations]
      operationId: listQuotations
      summary: List quotations
      x-permissions: [quotation:read]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema:
            type: array
            items: { $ref: '#/components/schemas/QuotationStatus' }
          explode: false
        - name: ownerId
          in: query
          schema: { type: string, format: uuid }
        - name: partnerId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Quotation page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationPage' }
    post:
      tags: [Quotations]
      operationId: createQuotation
      summary: Create a quotation draft
      x-requirements: [FR-QUO-001, FR-QUO-003, FR-QUO-004]
      x-permissions: [quotation:create]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateQuotationRequest' }
      responses:
        '201':
          description: Quotation draft created
          headers:
            Location:
              schema: { type: string, format: uri-reference }
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationDetail' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '409': { $ref: '#/components/responses/Conflict' }
  /quotations/{quotationId}:
    parameters:
      - $ref: '#/components/parameters/QuotationId'
    get:
      tags: [Quotations]
      operationId: getQuotation
      summary: Get internal quotation detail
      x-permissions: [quotation:read]
      responses:
        '200':
          description: Quotation detail
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Quotations]
      operationId: replaceQuotationDraft
      summary: Replace the editable current quotation draft
      x-requirements: [FR-QUO-001, FR-QUO-003, FR-QUO-005]
      x-permissions: [quotation:create]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateQuotationRequest' }
      responses:
        '200':
          description: Updated quotation
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationDetail' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/VersionConflict' }
        '428': { $ref: '#/components/responses/PreconditionRequired' }
  /quotations/{quotationId}/route-evaluations:
    post:
      tags: [Quotations]
      operationId: evaluateQuotationRoutes
      summary: Evaluate all configured trade routes for a quotation draft
      x-requirements: [FR-TRD-001, FR-TRD-002, FR-TRD-003, FR-TRD-004]
      x-permissions: [quotation:create]
      parameters:
        - $ref: '#/components/parameters/QuotationId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                requestedRouteCode: { $ref: '#/components/schemas/TradeRouteCode' }
                overrideReason: { type: string, minLength: 5, maxLength: 500 }
      responses:
        '200':
          description: Route evaluation saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RouteEvaluation' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/VersionConflict' }
        '422': { $ref: '#/components/responses/BusinessUnprocessable' }
  /quotations/{quotationId}/submission:
    post:
      tags: [Quotations]
      operationId: submitQuotation
      summary: Submit a quotation for approval or automatic approval
      x-requirements: [FR-QUO-005, FR-QUO-007]
      x-permissions: [quotation:submit]
      parameters:
        - $ref: '#/components/parameters/QuotationId'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Submission result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationCommandResult' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/VersionConflict' }
        '422': { $ref: '#/components/responses/BusinessUnprocessable' }
  /quotations/{quotationId}/approval:
    post:
      tags: [Quotations]
      operationId: decideQuotationApproval
      summary: Approve, request changes or reject a quotation
      x-requirements: [FR-QUO-007, FR-QUO-008]
      x-permissions: [quotation:approve]
      parameters:
        - $ref: '#/components/parameters/QuotationId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuotationApprovalRequest' }
      responses:
        '200':
          description: Approval decision recorded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationCommandResult' }
        '403': { $ref: '#/components/responses/AccessDenied' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/VersionConflict' }
  /quotations/{quotationId}/issue:
    post:
      tags: [Quotations]
      operationId: issueQuotation
      summary: Issue an approved quotation to the customer
      x-requirements: [FR-QUO-009]
      x-permissions: [quotation:issue]
      parameters:
        - $ref: '#/components/parameters/QuotationId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKeyOptional'
      responses:
        '200':
          description: Issued quotation and portal reference
          content:
            application/json:
              schema:
                type: object
                required: [quotationId, status, version, portalUrl, expiresAt]
                properties:
                  quotationId: { type: string, format: uuid }
                  status: { const: SENT }
                  version: { type: integer, format: int64 }
                  portalUrl: { type: string, format: uri-reference }
                  expiresAt: { type: string, format: date-time }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/VersionConflict' }
  /portal/quotations/{publicToken}:
    get:
      tags: [Customer Portal]
      operationId: getPublicQuotation
      summary: Get a customer-safe quotation view
      security: []
      parameters:
        - $ref: '#/components/parameters/PublicToken'
      responses:
        '200':
          description: Customer-safe quotation
          headers:
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicQuotation' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /portal/quotations/{publicToken}/acceptance:
    post:
      tags: [Customer Portal]
      operationId: acceptPublicQuotation
      summary: Accept a valid quotation idempotently
      security: []
      x-requirements: [FR-QUO-010, FR-ORD-001]
      parameters:
        - $ref: '#/components/parameters/PublicToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuotationAcceptanceRequest' }
      responses:
        '200':
          description: Existing acceptance replayed
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationAcceptanceResult' }
        '201':
          description: Quotation accepted
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationAcceptanceResult' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/DependencyUnavailable' }
  /portal/quotations/{publicToken}/rejection:
    post:
      tags: [Customer Portal]
      operationId: rejectPublicQuotation
      summary: Reject a valid quotation idempotently
      security: []
      x-requirements: [FR-QUO-010]
      parameters:
        - $ref: '#/components/parameters/PublicToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuotationRejectionRequest' }
      responses:
        '200':
          description: Existing rejection replayed
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationRejectionResult' }
        '201':
          description: Quotation rejected by the customer
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationRejectionResult' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/DependencyUnavailable' }
  /orders:
    get:
      tags: [Orders]
      operationId: listOrders
      summary: List trade orders
      x-permissions: [order:read]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema:
            type: array
            items: { $ref: '#/components/schemas/OrderStatus' }
          explode: false
        - name: partnerId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Order page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderPage' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/AuthenticationRequired' }
        '403': { $ref: '#/components/responses/AccessDenied' }
  /orders/{orderId}:
    get:
      tags: [Orders]
      operationId: getOrder
      summary: Get order detail and orchestration summaries
      x-permissions: [order:read]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order detail
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderDetail' }
