      properties:
        decision: { type: string, enum: [APPROVE, REQUEST_CHANGES, REJECT] }
        reason: { type: string, minLength: 5, maxLength: 500 }
        approvedPaymentTermDays: { type: integer, minimum: 0, maximum: 180 }
        approvedCreditLimit: { $ref: '#/components/schemas/Money' }
        approvedRouteCodes:
          type: array
          items: { $ref: '#/components/schemas/TradeRouteCode' }
          uniqueItems: true
        approvedServiceRegions:
          type: array
          items: { type: string, minLength: 1, maxLength: 80 }
          uniqueItems: true
        approvedCurrencies:
          type: array
          items: { type: string, pattern: '^[A-Z]{3}$' }
          uniqueItems: true
    PartnerReasonRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 5, maxLength: 500 }
    PartnerCommandResult:
      type: object
      required: [partnerId, number, status, version, allowedActions]
      properties:
        partnerId: { type: string, format: uuid }
        number: { type: string }
        status: { $ref: '#/components/schemas/PartnerStatus' }
        version: { type: integer, format: int64 }
        allowedActions:
          type: array
          items: { type: string }
    SkuSnapshot:
      type: object
      required: [skuId, skuCode, displayName, vintage, volumeMl, unitsPerCase, sourceVersion]
      properties:
        skuId: { type: string, format: uuid }
        skuCode: { type: string }
        displayName: { type: string }
        producerName: { type: string }
        regionName: { type: string }
        countryCode: { type: string, pattern: '^[A-Z]{2}$' }
        category:
          type: string
          enum: [RED, WHITE, ROSE, SPARKLING, FORTIFIED, DESSERT, OTHER]
        vintage: { type: string }
        volumeMl: { type: integer, minimum: 1 }
        unitsPerCase: { type: integer, minimum: 1 }
        packageType: { type: string, enum: [CASE, WOODEN_CASE, GIFT_BOX, BOTTLE] }
        status: { type: string, enum: [DRAFT, ACTIVE, INACTIVE] }
        sourceVersion: { type: integer, format: int64 }
        updatedAt: { type: string, format: date-time }
    ExactLotAvailability:
      type: object
      required: [lotId, lotCode, warehouseLabel, onHandQuantity, reservedQuantity, availableQuantity, dataAsOf]
      properties:
        lotId: { type: string, format: uuid }
        lotCode: { type: string }
        warehouseLabel: { type: string }
        onHandQuantity: { $ref: '#/components/schemas/Quantity' }
        reservedQuantity: { $ref: '#/components/schemas/Quantity' }
        availableQuantity: { $ref: '#/components/schemas/Quantity' }
        availableFrom: { type: [string, 'null'], format: date-time }
        dataAsOf: { type: string, format: date-time }
    SupplySummary:
      type: object
      required: [supplyPoolId, supplyType, locationLabel, availabilityLevel, displayQuantityBand, automaticallyReservable, exactLots, updatedAt]
      properties:
        supplyPoolId: { type: string, format: uuid }
        supplyType: { $ref: '#/components/schemas/SupplyType' }
        locationLabel: { type: string }
        displayedAvailableQuantity:
          oneOf:
            - { $ref: '#/components/schemas/Quantity' }
            - { type: 'null' }
        availabilityLevel: { $ref: '#/components/schemas/AvailabilityClass' }
        displayQuantityBand:
          type: string
          enum: [NONE, LOW, MEDIUM, HIGH, CONFIRMATION_REQUIRED]
        automaticallyReservable: { type: boolean }
        exactLots:
          type: array
          description: Empty unless the actor has exact-stock permission and warehouse scope.
          items: { $ref: '#/components/schemas/ExactLotAvailability' }
        estimatedAvailableAt: { type: [string, 'null'], format: date-time }
        updatedAt: { type: string, format: date-time }
    SkuSearchItem:
      type: object
      required: [sku, supplies]
      properties:
        sku: { $ref: '#/components/schemas/SkuSnapshot' }
        supplies:
          type: array
          items: { $ref: '#/components/schemas/SupplySummary' }
    SkuSearchPage:
      type: object
      required: [items, pageInfo, dataAsOf, availabilityDisclaimer]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SkuSearchItem' }
        pageInfo: { $ref: '#/components/schemas/PageInfo' }
        dataAsOf: { type: string, format: date-time }
        availabilityDisclaimer: { type: string }
    QuotationStatus:
      type: string
      enum: [DRAFT, PENDING_APPROVAL, CHANGES_REQUESTED, APPROVED, SENT, ACCEPTED, REJECTED, REJECTED_BY_CUSTOMER, WITHDRAWN, EXPIRED, CONVERTED, CANCELLED]
    QuotationLineInput:
      type: object
      required: [skuId, quantity]
      properties:
        skuId: { type: string, format: uuid }
        quantity: { $ref: '#/components/schemas/Quantity' }
