    PartnerTimelineEntry:
      type: object
      required: [id, occurredAt, action, changedFields]
      properties:
        id: { type: string, format: uuid }
        occurredAt: { type: string, format: date-time }
        action: { type: string }
        previousState: { type: [string, 'null'] }
        newState: { type: [string, 'null'] }
