    CreateQuotationRequest:
      type: object
      required: [partnerId, currency, requestedDeliveryDate, expiresAt, lines]
      properties:
        partnerId: { type: string, format: uuid }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        requestedDeliveryDate: { type: string, format: date }
        expiresAt: { type: string, format: date-time }
        paymentTermDays: { type: integer, minimum: 0, maximum: 180 }
        deliveryAddress: { $ref: '#/components/schemas/Address' }
        lines:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: '#/components/schemas/QuotationLineInput' }
    UpdateQuotationRequest:
      allOf:
        - $ref: '#/components/schemas/CreateQuotationRequest'
        - type: object
          properties:
            selectedRouteCode: { $ref: '#/components/schemas/TradeRouteCode' }
            routeOverrideReason: { type: string, minLength: 5, maxLength: 500 }
    PriceLine:
      type: object
      required: [lineId, sku, quantity, listUnitPrice, netUnitPrice, lineTotal]
      properties:
        lineId: { type: string, format: uuid }
        sku: { $ref: '#/components/schemas/SkuSnapshot' }
        quantity: { $ref: '#/components/schemas/Quantity' }
        listUnitPrice: { $ref: '#/components/schemas/Money' }
        discountRate: { type: string }
        netUnitPrice: { $ref: '#/components/schemas/Money' }
        allocatedCharges: { $ref: '#/components/schemas/Money' }
        lineTotal: { $ref: '#/components/schemas/Money' }
        supplyType: { $ref: '#/components/schemas/SupplyType' }
        supplyPoolId: { type: [string, 'null'], format: uuid }
    RouteRejection:
      type: object
      required: [ruleId, code, message]
      properties:
        ruleId: { type: string }
        code: { type: string }
        message: { type: string }
        parameters: { type: object, additionalProperties: true }
    RouteScore:
      type: object
      required: [cost, leadTime, supplyConfidence, operationalSimplicity, total]
      properties:
        cost: { type: string }
        leadTime: { type: string }
        supplyConfidence: { type: string }
        operationalSimplicity: { type: string }
        total: { type: string }
    RouteCandidate:
      type: object
      required: [routeCode, eligibility]
      properties:
        routeCode: { $ref: '#/components/schemas/TradeRouteCode' }
        eligibility: { type: string, enum: [ELIGIBLE, REJECTED] }
        score: { oneOf: [{ $ref: '#/components/schemas/RouteScore' }, { type: 'null' }] }
        estimatedDeliveryDate: { type: [string, 'null'], format: date }
        estimatedCharges: { oneOf: [{ $ref: '#/components/schemas/Money' }, { type: 'null' }] }
        rejections:
          type: array
          items: { $ref: '#/components/schemas/RouteRejection' }
    RouteEvaluation:
      type: object
      required: [evaluationId, policyVersion, evaluatedAt, candidates, recommendedRouteCode, inputHash]
      properties:
        evaluationId: { type: string, format: uuid }
        policyVersion: { type: string }
        evaluatedAt: { type: string, format: date-time }
        inputHash: { type: string }
        candidates:
          type: array
          items: { $ref: '#/components/schemas/RouteCandidate' }
        recommendedRouteCode: { oneOf: [{ $ref: '#/components/schemas/TradeRouteCode' }, { type: 'null' }] }
        selectedRouteCode: { oneOf: [{ $ref: '#/components/schemas/TradeRouteCode' }, { type: 'null' }] }
        override:
          type: [object, 'null']
          properties:
            reason: { type: string }
            actorId: { type: string, format: uuid }
            occurredAt: { type: string, format: date-time }
            originalRecommendation: { $ref: '#/components/schemas/TradeRouteCode' }
    ApprovalRequirement:
      type: object
      required: [ruleId, code, actualValue, threshold, message]
      properties:
        ruleId: { type: string }
        code: { type: string }
        actualValue: { type: string }
        threshold: { type: string }
        message: { type: string }
    QuotationSummary:
      type: object
      required: [id, number, partnerId, partnerName, revision, status, total, expiresAt, ownerId, version, updatedAt]
      properties:
        id: { type: string, format: uuid }
        number: { type: string }
        partnerId: { type: string, format: uuid }
        partnerName: { type: string }
        revision: { type: integer, minimum: 1 }
        status: { $ref: '#/components/schemas/QuotationStatus' }
        total: { $ref: '#/components/schemas/Money' }
        selectedRouteCode: { oneOf: [{ $ref: '#/components/schemas/TradeRouteCode' }, { type: 'null' }] }
        expiresAt: { type: string, format: date-time }
        ownerId: { type: string, format: uuid }
        version: { type: integer, format: int64 }
        updatedAt: { type: string, format: date-time }
    QuotationPage:
      type: object
      required: [items, pageInfo]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/QuotationSummary' }
        pageInfo: { $ref: '#/components/schemas/PageInfo' }
    QuotationDetail:
      allOf:
        - $ref: '#/components/schemas/QuotationSummary'
        - type: object
          required: [partnerSnapshot, requestedDeliveryDate, paymentTermDays, deliveryAddress, lines, subtotal, total, approvalRequirements, allowedActions, timeline]
          properties:
            partnerSnapshot:
              type: object
              required: [partnerId, number, displayName, paymentTermDays, sourceVersion]
              properties:
                partnerId: { type: string, format: uuid }
                number: { type: string }
                displayName: { type: string }
                paymentTermDays: { type: integer }
                sourceVersion: { type: integer, format: int64 }
                capturedAt: { type: string, format: date-time }
            requestedDeliveryDate: { type: string, format: date }
            paymentTermDays: { type: integer, minimum: 0, maximum: 180 }
            deliveryAddress: { $ref: '#/components/schemas/Address' }
            lines:
              type: array
              items: { $ref: '#/components/schemas/PriceLine' }
            subtotal: { $ref: '#/components/schemas/Money' }
            total: { $ref: '#/components/schemas/Money' }
            estimatedMarginRate:
              type: [string, 'null']
              description: Present only with quotation:read-commercial-sensitive
            routeEvaluation: { oneOf: [{ $ref: '#/components/schemas/RouteEvaluation' }, { type: 'null' }] }
            approvalRequirements:
              type: array
              items: { $ref: '#/components/schemas/ApprovalRequirement' }
            approvals:
              type: array
              items:
                type: object
                properties:
                  decision: { type: string }
                  reviewerId: { type: string, format: uuid }
                  reason: { type: string }
                  occurredAt: { type: string, format: date-time }
            allowedActions:
              type: array
              items: { type: string }
            timeline:
              type: array
              items:
                type: object
                required: [id, occurredAt, action]
                properties:
                  id: { type: string, format: uuid }
                  occurredAt: { type: string, format: date-time }
                  action: { type: string }
                  previousState: { type: [string, 'null'] }
                  newState: { type: [string, 'null'] }
                  safeReason: { type: [string, 'null'] }
    QuotationApprovalRequest:
      type: object
      required: [decision, reason]
      properties:
        decision: { type: string, enum: [APPROVE, REQUEST_CHANGES, REJECT] }
        reason: { type: string, minLength: 5, maxLength: 500 }
    QuotationCommandResult:
      type: object
      required: [quotationId, number, revision, status, version, allowedActions]
      properties:
        quotationId: { type: string, format: uuid }
        number: { type: string }
        revision: { type: integer }
        status: { $ref: '#/components/schemas/QuotationStatus' }
        version: { type: integer, format: int64 }
        allowedActions:
          type: array
          items: { type: string }
    PublicQuotation:
      type: object
      additionalProperties: false
      required: [number, revision, supplierDisplayName, customerDisplayName, status, expiresAt, lines, subtotal, fees, total, deliveryOption, paymentTermDays, termsVersion, termsSummary, allowedActions, decisionReceipt]
      properties:
        number: { type: string }
        revision: { type: integer, minimum: 1 }
        supplierPublicId: { type: string, maxLength: 80 }
        supplierDisplayName: { type: string, maxLength: 160 }
        customerPublicId: { type: string, maxLength: 80 }
        customerDisplayName: { type: string, maxLength: 160 }
        status: { type: string, enum: [SENT, ACCEPTED, REJECTED_BY_CUSTOMER, WITHDRAWN, EXPIRED, CONVERTED] }
        expiresAt: { type: string, format: date-time }
        lines:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: '#/components/schemas/PublicQuotationLine' }
        subtotal: { $ref: '#/components/schemas/PublicMoney' }
        fees: { $ref: '#/components/schemas/PublicMoney' }
        total: { $ref: '#/components/schemas/PublicMoney' }
        deliveryOption: { $ref: '#/components/schemas/PublicDeliveryOption' }
        paymentTermDays: { type: integer, minimum: 0, maximum: 180 }
        termsVersion: { type: string, minLength: 1, maxLength: 50 }
        termsSummary:
          type: array
          minItems: 1
          maxItems: 10
          items: { type: string, minLength: 1, maxLength: 500 }
        allowedActions:
          type: array
          uniqueItems: true
          items: { type: string, enum: [ACCEPT, REJECT, VIEW_ORDER] }
        decisionReceipt:
          oneOf:
            - $ref: '#/components/schemas/PublicQuotationDecisionReceipt'
