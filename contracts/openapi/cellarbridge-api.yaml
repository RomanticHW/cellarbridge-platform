        id: { type: string, format: uuid }
        number: { type: string }
        revisionId: { type: string, format: uuid }
        revision: { type: integer, minimum: 1 }
    OrderCustomerSnapshot:
      type: object
      additionalProperties: false
      required: [partnerId, partnerNumber, displayName, sourceVersion]
