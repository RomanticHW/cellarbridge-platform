      x-permissions: [settlement:record-payment]
      parameters:
        - $ref: '#/components/parameters/ReceivableId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecordPaymentRequest' }
      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReceivableDetail' }
        '200':
          description: Existing payment replayed
          headers:
            Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReceivableDetail' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/VersionConflict' }
  /receivables/{receivableId}/payments/{paymentId}/reversal:
    post:
      tags: [Settlement]
      operationId: reversePayment
