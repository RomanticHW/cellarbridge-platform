        acceptanceId: { type: string, format: uuid }
        quotationNumber: { type: string }
        status: { const: ACCEPTED }
        acceptedAt: { type: string, format: date-time }
        orderCreationStatus: { type: string, enum: [PENDING, CREATED, FAILED_RETRYING] }
