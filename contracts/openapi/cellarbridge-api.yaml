        partnerId: { type: string, format: uuid }
        partnerNumber: { type: string }
        displayName: { type: string }
        sourceVersion: { type: integer, minimum: 0 }
    OrderDeliveryAddress:
      type: object
      additionalProperties: false
      required: [countryCode, province, city, district, line1, postalCode]
      properties:
        countryCode: { type: string, pattern: '^[A-Z]{2}$' }
        province: { type: string, maxLength: 100 }
        city: { type: string, maxLength: 100 }
        district: { type: [string, 'null'], maxLength: 100 }
        line1: { type: string, maxLength: 200 }
        postalCode: { type: [string, 'null'], maxLength: 20 }
    OrderRouteSnapshot:
      type: object
      additionalProperties: false
