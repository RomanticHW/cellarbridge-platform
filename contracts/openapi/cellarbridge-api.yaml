      properties:
        id: { type: string, format: uuid }
        number: { type: string }
        sourceQuotationNumber: { type: string }
        partnerId: { type: string, format: uuid }
        partnerName: { type: string }
        status: { $ref: '#/components/schemas/OrderStatus' }
        total: { $ref: '#/components/schemas/OrderMoney' }
