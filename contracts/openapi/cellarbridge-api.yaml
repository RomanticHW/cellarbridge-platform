      required: [skuCode, description, quantity, unitPrice, lineTotal]
      properties:
        skuCode: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, minLength: 1, maxLength: 200 }
        vintage: { type: string, maxLength: 20 }
        package: { type: string, maxLength: 80 }
        quantity: { $ref: '#/components/schemas/PublicQuantity' }
        unitPrice: { $ref: '#/components/schemas/PublicMoney' }
        lineTotal: { $ref: '#/components/schemas/PublicMoney' }
    PublicDeliveryOption:
      type: object
      additionalProperties: false
      required: [label, estimatedWindow]
      properties:
        label: { type: string, minLength: 1, maxLength: 160 }
        estimatedWindow: { type: string, minLength: 1, maxLength: 160 }
    PublicQuotationDecisionReceipt:
      type: object
      additionalProperties: false
      required: [decisionId, decision, decidedAt]
      properties:
        decisionId: { type: string, format: uuid }
        decision: { type: string, enum: [ACCEPTED, REJECTED_BY_CUSTOMER] }
