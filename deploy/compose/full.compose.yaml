name: cellarbridge-full

services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}

  keycloak:
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:?Set KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD}

  backend:
    environment:
      CELLARBRIDGE_DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      CELLARBRIDGE_LOG_FORMAT: ecs
      CELLARBRIDGE_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      CELLARBRIDGE_TRACE_SAMPLE_PROBABILITY: ${TRACE_SAMPLE_PROBABILITY:-1.0}
    depends_on:
      otel-collector:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    command: [--config=/etc/otelcol-contrib/config.yaml]
    volumes:
      - ../observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - '127.0.0.1:${OTLP_GRPC_PORT:-4317}:4317'
      - '127.0.0.1:${OTLP_HTTP_PORT:-4318}:4318'
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test: [CMD, /otelcol-contrib, components]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  prometheus:
    image: prom/prometheus:v3.12.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ../observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ../observability/alert-rules.yaml:/etc/prometheus/alert-rules.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - '127.0.0.1:${PROMETHEUS_PORT:-9090}:9090'
    user: '65534:65534'
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:9090/-/ready]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M

  tempo:
    image: grafana/tempo:2.10.5
    command: [-config.file=/etc/tempo.yaml]
    volumes:
      - ../observability/tempo.yaml:/etc/tempo.yaml:ro
    tmpfs:
      - /var/tempo:size=512m,uid=10001,gid=10001,mode=0750
    ports:
      - '127.0.0.1:${TEMPO_PORT:-3200}:3200'
    user: '10001:10001'
    healthcheck:
      test: [CMD, /tempo, -version]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M

  grafana:
    image: grafana/grafana:13.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?Set GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '127.0.0.1:${GRAFANA_PORT:-3000}:3000'
    healthcheck:
      test: [CMD-SHELL, wget -qO- http://127.0.0.1:3000/api/health | grep -q ok]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 384M

volumes:
  prometheus-data:
  grafana-data:
