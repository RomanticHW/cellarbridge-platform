name: cellarbridge-core

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cellarbridge}
      POSTGRES_USER: ${POSTGRES_USER:-cellarbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cellarbridge_local}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  keycloak:
    build:
      context: ../..
      dockerfile: deploy/keycloak/Dockerfile
    image: cellarbridge/keycloak:local
    command:
      [
        'start-dev',
        '--import-realm',
        '--spi-client-policy-executor--cellarbridge-mcp-resource-binding--enabled=true',
        '--spi-token-interceptor--cellarbridge-mcp-resource-binding--enabled=true',
      ]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-local-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-local-admin-change-me}
      KC_HEALTH_ENABLED: 'true'
      KC_HOSTNAME: ${OIDC_HOSTNAME:-http://localhost:8081}
    volumes:
      - ../keycloak:/opt/keycloak/data/import:ro
    ports:
      - '${KEYCLOAK_PORT:-8081}:8080'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'exec 3<>/dev/tcp/127.0.0.1/9000; printf "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3; grep -q "200 OK" <&3',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      CELLARBRIDGE_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cellarbridge}
      CELLARBRIDGE_DB_USERNAME: ${POSTGRES_USER:-cellarbridge}
      CELLARBRIDGE_DB_PASSWORD: ${POSTGRES_PASSWORD:-cellarbridge_local}
      CELLARBRIDGE_DB_POOL_SIZE: ${CELLARBRIDGE_DB_POOL_SIZE:-10}
      CELLARBRIDGE_COMMIT: ${CELLARBRIDGE_COMMIT:-local}
      CELLARBRIDGE_MCP_ENABLED: ${CELLARBRIDGE_MCP_ENABLED:-true}
      CELLARBRIDGE_MCP_RESOURCE: ${CELLARBRIDGE_MCP_RESOURCE:-https://mcp.cellarbridge.example/mcp}
      CELLARBRIDGE_MCP_AUDIENCE: ${CELLARBRIDGE_MCP_AUDIENCE:-https://mcp.cellarbridge.example/mcp}
      CELLARBRIDGE_MCP_SCOPE: ${CELLARBRIDGE_MCP_SCOPE:-mcp:read}
      CELLARBRIDGE_MCP_ALLOWED_CLIENTS: ${CELLARBRIDGE_MCP_ALLOWED_CLIENTS:-cellarbridge-mcp-host}
      CELLARBRIDGE_MCP_ALLOWED_ORIGINS: ${CELLARBRIDGE_MCP_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CELLARBRIDGE_MCP_ALLOWED_HOSTS: ${CELLARBRIDGE_MCP_ALLOWED_HOSTS:-localhost:8080,127.0.0.1:8080}
      CELLARBRIDGE_MCP_MAX_REQUEST_BYTES: ${CELLARBRIDGE_MCP_MAX_REQUEST_BYTES:-65536}
      CELLARBRIDGE_MCP_RATE_CAPACITY: ${CELLARBRIDGE_MCP_RATE_CAPACITY:-30}
      CELLARBRIDGE_MCP_RATE_REFILL_PER_SECOND: ${CELLARBRIDGE_MCP_RATE_REFILL_PER_SECOND:-10}
      CELLARBRIDGE_MCP_MAX_CONCURRENCY: ${CELLARBRIDGE_MCP_MAX_CONCURRENCY:-8}
      CELLARBRIDGE_MCP_MAX_CLIENT_CONCURRENCY: ${CELLARBRIDGE_MCP_MAX_CLIENT_CONCURRENCY:-4}
      CELLARBRIDGE_MCP_REST_CONNECTION_RESERVE: ${CELLARBRIDGE_MCP_REST_CONNECTION_RESERVE:-2}
      CELLARBRIDGE_MCP_REQUEST_TIMEOUT: ${CELLARBRIDGE_MCP_REQUEST_TIMEOUT:-PT5S}
      CELLARBRIDGE_MCP_STATEMENT_TIMEOUT: ${CELLARBRIDGE_MCP_STATEMENT_TIMEOUT:-PT3S}
      SPRING_PROFILES_ACTIVE: demo
      CELLARBRIDGE_SECURITY_ISSUER: ${OIDC_AUTHORITY:-http://localhost:8081/realms/cellarbridge}
      CELLARBRIDGE_SECURITY_JWK_SET_URI: http://keycloak:8080/realms/cellarbridge/protocol/openid-connect/certs
      CELLARBRIDGE_SECURITY_AUDIENCE: ${OIDC_AUDIENCE:-cellarbridge-api}
      CELLARBRIDGE_SECURITY_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED: ${MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED:-false}
    ports:
      - '127.0.0.1:${BACKEND_PORT:-8080}:8080'
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: [CMD, /usr/bin/wget, -qO-, http://127.0.0.1:8080/actuator/health/readiness]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 1024M
        reservations:
          memory: 512M

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_OIDC_AUTHORITY: ${OIDC_AUTHORITY:-http://localhost:8081/realms/cellarbridge}
        VITE_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-cellarbridge-console}
    ports:
      - '${FRONTEND_PORT:-5173}:8080'
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/lib/nginx/tmp:size=32m,uid=65532,gid=65532,mode=0750
      - /var/run:size=4m,mode=1777
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [CMD, /usr/sbin/nginx, -t]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          memory: 32M

volumes:
  postgres-data:
